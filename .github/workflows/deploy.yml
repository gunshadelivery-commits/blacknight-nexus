# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Verify secrets are set
        run: |
          echo "Checking if secrets are configured..."
          if [ -z "${{ secrets.VITE_GAS_URL }}" ]; then echo "⚠️ WARNING: VITE_GAS_URL is not set!"; fi
          if [ -z "${{ secrets.VITE_SHEET_CSV_URL }}" ]; then echo "⚠️ WARNING: VITE_SHEET_CSV_URL is not set!"; fi
          if [ -z "${{ secrets.VITE_ORDERS_CSV_URL }}" ]; then echo "⚠️ WARNING: VITE_ORDERS_CSV_URL is not set!"; fi
          if [ -z "${{ secrets.VITE_ADMIN_PASSWORD }}" ]; then echo "⚠️ WARNING: VITE_ADMIN_PASSWORD is not set!"; fi
          echo "Done checking secrets."
      - name: Build project
        env:
          VITE_SHEET_CSV_URL: ${{ secrets.VITE_SHEET_CSV_URL }}
          VITE_ORDERS_CSV_URL: ${{ secrets.VITE_ORDERS_CSV_URL }}
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
          VITE_LINE_OA_ID: ${{ secrets.VITE_LINE_OA_ID }}
          VITE_IMGBB_API_KEY: ${{ secrets.VITE_IMGBB_API_KEY }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
        run: npm run build
      - name: Add CNAME for custom domain
        run: echo "blacknight69.com" > ./dist/CNAME
      - name: Copy static SEO files to dist
        run: cp sitemap.xml robots.txt llms.txt ./dist/
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: "./dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
