<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlackNight69 - สินค้าทั้งหมด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-tab {
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .category-tab-active { background-color: #6366f1; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }
        .category-tab-inactive { background-color: white; color: #64748b; border: 1px solid #f1f5f9; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Toast Styles */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 350px; }
        .toast { pointer-events: auto; padding: 12px 20px; border-radius: 20px; color: white; font-weight: 600; font-size: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast.success { background: #6366f1; border: 1px solid #4f46e5; }
        .toast.error { background: #ef4444; border: 1px solid #dc2626; }
        .toast.hide { animation: slideOut 0.3s forwards; }
        @keyframes slideOut { to { transform: translateY(-20px); opacity: 0; } }
    </style>
</head>
<body class="pb-24">
    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>
    <!-- NAVBAR -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">📦</span>
                <div class="flex flex-col">
                    <h1 class="text-lg font-bold leading-none text-slate-800">BlackNight69</h1>
                    <span class="text-[10px] opacity-60 font-bold uppercase tracking-wider text-slate-400">Quality Items v3.0.0</span>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative p-2 bg-slate-50 rounded-xl hover:bg-slate-100 transition">
                <span class="text-xl">🛒</span>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white hidden">0</span>
            </button>
        </div>
    </nav>

    <!-- BANNER -->
    <div class="max-w-md mx-auto px-4 mt-4">
        <div class="bg-gradient-to-br from-indigo-800 to-indigo-900 rounded-3xl p-6 text-white relative overflow-hidden shadow-xl shadow-indigo-100">
            <div class="relative z-10">
                <h2 class="text-2xl font-bold mb-1">คอลเลกชันใหม่ ✨</h2>
                <p class="text-indigo-400 text-xs">สินค้าคุณภาพพรีเมียม เลือกสรรมาเพื่อคุณ</p>
            </div>
            <span class="absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12">📦</span>
        </div>
    </div>

    <!-- CATEGORY TABS -->
    <div class="max-w-md mx-auto px-4 mt-6 overflow-x-auto no-scrollbar flex gap-2" id="categoryTabs">
        <button onclick="switchCategory('All')" class="category-tab category-tab-active" id="tab-All">ทั้งหมด</button>
        <button onclick="switchCategory('Electronics')" class="category-tab category-tab-inactive" id="tab-Electronics">💻 Electronics</button>
        <button onclick="switchCategory('Fashion')" class="category-tab category-tab-inactive" id="tab-Fashion">👕 Fashion</button>
        <button onclick="switchCategory('Home')" class="category-tab category-tab-inactive" id="tab-Home">🏠 Home</button>
    </div>

    <!-- PRODUCT LIST -->
    <div class="max-w-md mx-auto px-4 mt-6 grid grid-cols-2 gap-4" id="productList">
        <!-- Loading Skeleton -->
        <div class="bg-white rounded-3xl p-3 animate-pulse border border-slate-50">
            <div class="aspect-square bg-slate-100 rounded-2xl mb-3"></div>
            <div class="h-4 bg-slate-100 rounded w-3/4 mb-2"></div>
            <div class="h-4 bg-slate-100 rounded w-1/2"></div>
        </div>
        <div class="bg-white rounded-3xl p-3 animate-pulse border border-slate-50">
            <div class="aspect-square bg-slate-100 rounded-2xl mb-3"></div>
            <div class="h-4 bg-slate-100 rounded w-3/4 mb-2"></div>
            <div class="h-4 bg-slate-100 rounded w-1/2"></div>
        </div>
    </div>

    <!-- CART SIDEBAR (MODAL) -->
    <div id="cartSidebar" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[40px] shadow-2xl h-[85vh] flex flex-col transform translate-y-full transition-transform duration-300" id="cartContent">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800">รถเข็นของคุณ</h3>
                <button onclick="toggleCart()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4">
                <!-- Cart Items -->
            </div>
            <div class="p-8 pb-24 bg-slate-50/50 rounded-t-[40px]">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-slate-500 font-medium">ยอดรวมทั้งหมด</span>
                    <span id="cartTotal" class="text-2xl font-black text-slate-800">0 ฿</span>
                </div>
                <button onclick="goToCheckout()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-slate-200 hover:bg-slate-800 transition active:scale-95">ไปที่หน้าชำระเงิน 🚀</button>
            </div>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkoutModal" class="fixed inset-0 z-[70] hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div>
        <div class="absolute inset-x-0 bottom-0 top-10 bg-white rounded-t-[40px] flex flex-col max-w-md mx-auto">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="text-xl font-bold">ข้อมูลการจัดส่ง</h3>
                <button onclick="closeCheckout()" class="text-slate-400">ปิด</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    <div class="space-y-4">
                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">ชื่อ-นามสกุล ผู้รับ *</label>
                            <input type="text" id="custName" class="w-full bg-slate-50 border-2 border-transparent focus:border-slate-900 focus:bg-white rounded-2xl px-5 py-4 transition outline-none text-lg font-medium" placeholder="ระบุชื่อผู้รับสินค้า">
                        </div>

                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">เบอร์โทรติดต่อ *</label>
                            <input type="tel" id="custPhone" class="w-full bg-slate-50 border-2 border-transparent focus:border-slate-900 focus:bg-white rounded-2xl px-5 py-4 transition outline-none text-lg font-medium" placeholder="08x-xxx-xxxx">
                        </div>

                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">ที่อยู่จัดส่งโดยละเอียด *</label>
                            <textarea id="custAddress" rows="3" class="w-full bg-slate-50 border-2 border-transparent focus:border-slate-900 focus:bg-white rounded-2xl px-5 py-4 transition outline-none text-base" placeholder="บ้านเลขที่, ซอย, ถนน, ตำบล, อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>
                        </div>

                        <!-- PAYMENT SELECTION -->
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="updatePaymentMethod('transfer')" id="payTransfer" class="flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-900 bg-white transition shadow-sm">
                                <span class="text-2xl">💳</span>
                                <span class="text-xs font-bold text-slate-900 uppercase tracking-wider">โอนเงิน</span>
                            </button>
                            <button onclick="updatePaymentMethod('cod')" id="payCOD" class="flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-50 bg-slate-50 text-slate-400 transition">
                                <span class="text-2xl">🚚</span>
                                <span class="text-xs font-bold uppercase tracking-wider">เก็บเงินปลายทาง</span>
                            </button>
                        </div>

                        <div id="paymentDetailsSection" class="p-6 bg-blue-50 rounded-3xl border border-blue-100 space-y-3">
                            <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest">ช่องทางชำระเงิน</label>
                            <div id="paymentMethodsContainer" class="space-y-3">
                                <!-- Payment methods will be loaded here -->
                            </div>
                        </div>

                        <div id="slipUploadSection" class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">หลักฐานการโอนเงิน (สลิป) *</label>
                            <input type="file" id="slipInput" accept="image/*" onchange="previewSlip(this)" class="hidden">
                            <label for="slipInput" class="cursor-pointer block w-full aspect-video bg-white border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center gap-2 text-slate-400 hover:border-slate-400 transition overflow-hidden">
                                <img id="slipPreview" class="hidden w-full h-full object-cover">
                                <div id="slipPlaceholder" class="flex flex-col items-center">
                                    <span class="text-3xl mb-1">📸</span>
                                    <span class="text-xs font-bold">อัปโหลดสลิปที่นี่</span>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="p-8 border-t border-slate-50">
                    <button onclick="submitOrder()" id="submitOrderBtn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-slate-200 disabled:opacity-50">สั่งซื้อและส่งข้อมูล 🛸</button>
                </div>
            </div>
        </div>

    <!-- SUCCESS MODAL -->
    <div id="successModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-xl"></div>
        <div class="bg-white rounded-[40px] p-8 w-full max-w-sm relative text-center space-y-6">
            <div class="w-24 h-24 bg-emerald-100 text-5xl flex items-center justify-center rounded-full mx-auto animate-bounce">✅</div>
            <div>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">สั่งซื้อสำเร็จ!</h3>
                <p class="text-slate-500 text-sm">ออเดอร์ของคุณกำลังเดินทางไปหาคุณ</p>
                <div class="mt-4 p-4 bg-slate-50 rounded-2xl">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">ยอดชำระทั้งสิ้น</p>
                    <p id="finalOrderTotal" class="text-2xl font-black text-slate-800">0 ฿</p>
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="redirectToLine()" class="w-full bg-[#06C755] text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-100 hover:opacity-90 transition">
                    <span>💬</span> แจ้งแอดมินทาง LINE
                </button>
                <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold text-sm hover:bg-slate-200 transition">กลับไปหน้าแรก</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center py-2 z-50 shadow-[0_-5px_15px_-3px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="flex flex-col items-center gap-1 group">
            <span class="text-xl opacity-40 group-[.active]:opacity-100 transition-opacity">🏠</span>
            <span class="text-[10px] font-bold text-slate-400 group-[.active]:text-indigo-600 transition-colors">หน้าแรก</span>
        </a>
        <a href="accessories.html" class="flex flex-col items-center gap-1 active group">
            <span class="text-xl opacity-40 group-[.active]:opacity-100 transition-opacity">📦</span>
            <span class="text-[10px] font-bold text-slate-400 group-[.active]:text-indigo-600 transition-colors">สินค้าทั้งหมด</span>
        </a>
    </nav>

    <!-- SCRIPTS -->
    <script type="module" src="./src/accessories.js"></script>
</body>
</html>
